body:
  text: 禮雜問王朔之問云至尊為后之父母服不意謂雖居尊位亦當不以己尊而便降也答曰王者之於天下與諸侯之於一國義無以異今謂粗可依準孝武泰元元年正月王鎮軍薨按即后父也剋舉哀而成出制服三日僕射己下皆從服杜佑通典卷八十譙王司馬恬問曰妾有二子而出嫁若命他妾兼子為其母所命妾今亡子當有服不答曰昔男子外有傅內慈母君命教子何服之有通典卷八十一曹述初問曰有人再娶後妻無父母而前妻父母亡當有服不答曰禮記小記曰從服者所從亡則已今妻既卒則無所從不應服也述初又難曰妻為夫黨既為屬從至於夫卒服之無虧妻之父母而妻卒則已統略準情不見其義若以妻之父母不得準夫之旁親實所疑也小記所稱自為君黨子為君母黨服耳又答曰鮮有同者此亦無準據殆是率心而行也通典卷九十五鄭澄問弟女當適武留繇兒留去年自將兒來拜時其兒今卒不佑弟女當奔弔不若弔著何服答曰禮記曾子問曰娶女有吉日而女死如之何孔子曰壻齌縗而往弔既葬而除之夫死亦如之謂斬縗也謂既親拜舅寧當於吉日耳鄭又問若拜舅為重於吉日應服斬誠如來告若拜傍親復云何昔荀啓拜時而卒庾家女不往弔不被譏何也再答曰三代殊制禮有因革意為娶女有吉日理輕於拜舅復重於拜餘人荀氏海內名族庾則異行之門想其不奔弔必有所據通典卷九十九禮銜命出使而君薨在道則反四境則遂其事然則聞舊君之喪反命而後赴也又問曰仕今君之朝欲奔舊君之喪而今君不許可以輒去平寧答事君當不義則爭之三諫不從去之可也君有戎役之事王命所制此禮權也同上鄭襲難曰以閏三月五日恐者當以來年何月祥何月為忌日答曰謂之閏月以餘分之日閏益月耳非正月也非正月則吉凶大事皆不可用故天子不告朔而喪者不數以閏月死既不數之禮十三月小祥二十五月大祥自然當以來年四月小祥明年四月大祥也所謂忌日者死者之日月耳今以閏月來年無忌安得有忌日耶當以後歲閏月五日為忌是五年再有忌日也難曰忌日之感終身之戚罔極之恩不離一日今須後閏則三年之忌不亦遠乎傳稱子卯不樂謂之疾日先儒以為甲子乙卯誠如是自宜以日辰為忌遇之而感耳通典卷一百殷仲堪問從兄道林營遷改事先儒並不疑緦服代所多用且當依行至於釋除王鄭不同何者為允答曰改葬者非常故不在五服之章葬遲者自當以畢事為斷亦猶久喪服踰三年又云父喪未葬主喪者不除當其為主五服皆然苟有事故葬必踰期此非常之通服也通典卷一百二殷仲堪問曰荀訥議太后改葬既據不虞朝廷所用賀要記云三月便止何也答曰賀無此文或好事者為之也不見馬鄭賀范説改葬有虞神已在廟虞何為哉同上王薈問曰人有父在遭母喪十七月乃得葬便當頓除更復練祥耶答曰三年而後葬者必再祭練祥之祭也主喪不除未葬不變也十七月既祥即除服不禫可知也通典卷一百三
